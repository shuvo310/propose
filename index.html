<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You ❤️</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .main{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child{
            background-color: violet;
            background-image: url(love-bg.jpg);
            height: 827px;
            width: 400px;
            text-align: center;
        }
        .child h1{
            color: yellow;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            text-shadow: 2px 2px 5px yellow;
            font-weight: bolder;
            font-size: 50px;
            padding-top: 10px;
        }
        .child p{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 25px;
            color: yellow;
        }
        .yes{
            margin-top: 20px;
            padding: 10px 20px;
            background-color: rgb(255, 0, 106);
            border: 2px solid rgb(255, 0, 106);
            border-radius: 25px;
            box-shadow: 0px 0px 5px rgb(255, 0, 106);
            cursor: pointer;
        }
        .yes a{
            text-decoration: none;
            color: white;
            font-size: 15px;
            text-shadow: 2px 2px 10px white;
        }
        .no{
            margin-top: 20px;
            padding: 10px 20px;
            background-color: red;
            border: 2px solid red;
            border-radius: 25px;
            box-shadow: 0px 0px 5px red;
            color: white;
            font-size: 12px;
        }
        .no:hover{
            display: none;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="child">
            <h1>I Love You.</h1>
            <p>Do You Love Me ?</p>
            <button class="yes"><a href="https://shuvo-das.bro.bd" target="_blank">Yes</a></button>
            <button class="no">No</button>
        </div>
    </div>
</body>
</html>
